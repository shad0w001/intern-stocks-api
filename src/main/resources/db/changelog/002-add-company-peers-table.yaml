databaseChangeLog:
  - changeSet:
      id: 001
      author: 1243557
      preConditions:
        - onFail: CONTINUE
        - dbms:
            type: postgresql
      changes:
        - createTable:
            tableName: company_peers
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: company_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: symbol
                  type: VARCHAR(10)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: company_peers
            baseColumnNames: company_id
            referencedTableName: companies
            referencedColumnNames: id
            constraintName: fk_peers_company
            onDelete: CASCADE

        - addUniqueConstraint:
            tableName: company_peers
            columnNames: company_id, symbol
            constraintName: uq_peers_company_symbol